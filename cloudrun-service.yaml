# GCP Cloud Run service config for CAE Backend
# Deploy: gcloud run services replace cloudrun-service.yaml
#
# Or deploy via CLI:
#   gcloud run deploy cae-backend \
#     --source . \
#     --region asia-southeast3 \
#     --allow-unauthenticated \
#     --memory 1Gi \
#     --cpu 1 \
#     --timeout 300 \
#     --max-instances 3 \
#     --set-env-vars LLM_PROVIDER=gemini

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cae-backend
  annotations:
    run.googleapis.com/description: "Corporate Accountability Engine — Adversarial AI auditor for greenwashing detection"
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost savings)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Allow up to 5 min for deep Gemini Pro analysis
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
        - image: IMAGE_URL  # Replace with your Artifact Registry image URL
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          env:
            - name: LLM_PROVIDER
              value: "gemini"
            - name: PORT
              value: "8080"
            # Set these as secrets in GCP Secret Manager, then reference:
            # - name: GEMINI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: gemini-api-key
            #       key: latest
            # - name: DASHSCOPE_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: dashscope-api-key
            #       key: latest
            # - name: SUPABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: supabase-url
            #       key: latest
            # - name: SUPABASE_SERVICE_ROLE_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: supabase-service-role-key
            #       key: latest
            # - name: FRONTEND_URL
            #   value: "https://cae-animals.com"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
